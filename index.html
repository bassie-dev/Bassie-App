<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weather-app</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=location_on" />
  <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
</head>
  <body>
    <div class="container">
    <header>

      <form id="search-form">
        <input class="search" type="search" placeholder="Enter a city.." id="search"/>
        <input class="submit-button" type="submit" id="submit-button" />
      </form>
    </header>

    <hr />
    <h1>
    </h1>
    
    <span class="weather-icon" >☀️</span>
    <span class="current-temp" id="temperature"></span>
    <span class="weather-unit">℃</span>
    <br />
    <br/>
    <div class="h-w">
    Humidity:<span class="humidity">34%</span>
    <br>
    Wind Speed:<span class="wind">11km/h</span>
    </div>
    <br />
    <div class="d-t">
    <div class="weather"><strong>Weather</strong></div>
    
    <div class="date-time">Wednsday 11:40</div>
    
   <div class="current-weather"> Clear sky</div>
    </div>
    <footer>
      This project was coded by
      <a href="https://github.com/bassie-dev" target="blank">Bassie</a>,
      open-sourced on
      <a href="https://github.com/bassie-dev/Bassie-App" target="blank"
        >Github</a
      >
      and hosted on
      <a
        href="https://app.netlify.com/projects/bassie-weather/overview"
        target="blank"
        >Netlify</a
      >.
    </footer>
    </div>
    <script src="index.js"></script>
  </body>
</html>
